<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIPES - Tingo María</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <header class="main-header">
        <div class="header-content">
            <h1>Ministerio Personal y Escuela Sabática <span class="mipes-tag">(MIPES)</span></h1>
            <h2>Iglesia Adventista la Central — Tingo María</h2>
            <div class="divider"></div>
        </div>
    </header>

    <main class="container">
        <div class="action-section">
            <button id="btnIngresar" class="btn-nav">Acceso Vamos GP</button>
            <button id="btnDones" class="btn-nav btn-gold">Test de DONES</button>
        </div>

        <section class="gallery-wrapper">
            <h3 class="section-title"><i class="fas fa-bullhorn"></i> Actividades de Evangelismo</h3>
            <div class="gallery-grid" id="galleryEvangelismo"></div>
        </section>

        <section class="gallery-wrapper">
            <h3 class="section-title"><i class="fas fa-book-open"></i> Escuela Sabática</h3>
            <div class="gallery-grid" id="galleryEscuelaSabatica"></div>
        </section>

        <section class="prayer-section">
            <div class="prayer-card">
                <h3><i class="fas fa-hands-praying"></i> Pedidos de Oración</h3>
                <p>Escribe tu motivo y nuestra IA lo organizará para el grupo de intercesión.</p>
                <form id="prayerForm">
                    <input type="text" id="userName" placeholder="Tu nombre completo" required>
                    <textarea id="prayerReason" placeholder="¿Por qué te gustaría que oremos hoy?" required></textarea>
                    <button type="submit" class="btn-whatsapp">
                        <i class="fab fa-whatsapp"></i> Enviar a Intercesión
                    </button>
                </form>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
