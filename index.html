<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIPES - Iglesia Central Tingo María</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <a href="#seccion-oracion" class="floating-prayer">
        <i class="fas fa-hands-praying"></i>
    </a>

    <header class="main-header">
        <div class="header-content">
            <div class="avatar-container">
                <img src="https://cdn-icons-png.flaticon.com/512/4140/4140037.png" alt="Guía IA" class="avatar-img">
                <div class="avatar-bubble">¡Hola! Soy tu guía MIPES. ¿En qué puedo ayudarte hoy?</div>
            </div>
            <h1>Ministerio Personal y Escuela Sabática <span class="mipes-tag">(MIPES)</span></h1>
            <h2>Iglesia Adventista la Central — Tingo María</h2>
            <div class="divider"></div>
        </div>
    </header>

    <main class="container">
        <div class="action-section">
            <button id="btnIngresar" class="btn-nav">Registro Grupo Pequeño</button>
            <button id="btnDones" class="btn-nav btn-gold">Test de DONES</button>
        </div>

        <section class="gallery-wrapper">
            <h3 class="section-title"><i class="fas fa-bullhorn"></i> Evangelismo</h3>
            <div class="gallery-grid" id="galleryEvangelismo"></div>
        </section>

        <section class="gallery-wrapper">
            <h3 class="section-title"><i class="fas fa-book-open"></i> Escuela Sabática</h3>
            <div class="gallery-grid" id="galleryEscuelaSabatica"></div>
        </section>

        <section id="seccion-oracion" class="prayer-section">
            <div class="prayer-card">
                <div class="prayer-icon-header">
                    <i class="fas fa-hands-praying"></i>
                </div>
                <h3>Registro de Oración</h3>
                <p>Tus peticiones se guardan automáticamente en nuestra red de intercesión.</p>
                <form id="prayerForm">
                    <input type="text" id="userName" placeholder="Nombres y Apellidos" required>
                    <input type="tel" id="userPhone" placeholder="Número de Celular" required>
                    <input type="text" id="userAddress" placeholder="Dirección" required>
                    <textarea id="prayerReason" placeholder="Motivo de oración..." required></textarea>
                    <button type="submit" id="btnSubmit" class="btn-save">
                        <i class="fas fa-cloud-upload-alt"></i> ENVIAR PETICIÓN
                    </button>
                </form>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
